name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref to save Actions minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: careervine
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: careervine/package-lock.json

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npx eslint . --max-warnings 0

      - name: Test
        run: npx vitest run

      - name: Build
        run: npx next build
        env:
          # Placeholders so the production build is deterministic without real
          # secrets. Clients are constructed lazily / read at request time; the
          # build never connects anywhere. Real values live in Vercel.
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
          NEXT_PUBLIC_APP_URL: https://www.careervine.app

  mcp:
    name: mcp
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: careervine-mcp
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: careervine-mcp/package-lock.json

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck
